<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Código Popup</title>

<style>
body{
    margin:0;
    height:100vh;
    font-family:'Georgia', serif;

    background-image: url("salida.jpg");
    background-size: 75%;
    background-position: center;
    background-repeat: no-repeat;
    background-color: black;
}

/* OVERLAY POPUP */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);

    display:flex;
    justify-content:center;
    align-items:center;
}

/* PANEL */
.panel{
    position:relative;
    background: linear-gradient(145deg, #2b2b2b, #0f0f0f);
    padding:28px;
    border-radius:18px;

    border:2px solid #7a6a4f;

    box-shadow:
        inset 0 0 15px rgba(0,0,0,0.9),
        0 0 30px rgba(0,0,0,0.8);

    text-align:center;
    width:270px;
}

/* CRUZ */
.close{
    position:absolute;
    top:10px;
    right:12px;
    font-size:22px;
    cursor:pointer;
    color:#c9b98a;
    font-weight:bold;
}

.close:hover{
    color:#ff5a5a;
}

/* TÍTULO */
h2{
    color:#e0d2a8;
    margin-bottom:12px;
}

/* PANTALLA */
.screen{
    font-size:42px;
    letter-spacing:10px;
    color:#7CFFB2;
    margin-bottom:15px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

/* BOTONES */
button{
    font-size:22px;
    padding:15px;
    border-radius:12px;

    border:2px solid #7a6a4f;
    background: linear-gradient(145deg, #4a4a4a, #2b2b2b);
    color:#e8d9b5;
    cursor:pointer;
}

button:hover{
    transform:scale(1.06);
}

/* OK */
.ok{
    background: linear-gradient(145deg, #2ecc71, #1f8f4d);
    color:#000;
    font-weight:bold;
}

/* BACK */
.back{
    background: linear-gradient(145deg, #c0392b, #7a1f16);
    color:#000;
    font-weight:bold;
}

/* RESULTADO */
#result.success{
    color:#7CFFB2;
}
#result.error{
    color:#ff5a5a;
}
</style>
</head>

<body>

<div class="overlay" id="overlay">

<div class="panel">

<!-- CRUZ -->
<div class="close" onclick="closePopup()">✕</div>

<h2>DANOS TU CODIGO</h2>

<div class="screen" id="screen">---</div>

<div class="grid">
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button>
    <button class="back" onclick="reset()">←</button>
    <button onclick="press(0)">0</button>
    <button class="ok" onclick="check()">✓</button>
</div>

<div id="result"></div>

</div>
</div>

<script>

let input = "";
const secret = "739";

function press(n){
    if(input.length < 3){
        input += n;
        update();
    }
}

function update(){
    let display = input.replace(/./g, "•");
    display = display.padEnd(3, "-");
    document.getElementById("screen").innerText = display;
}

function reset(){
    input = "";
    update();
    document.getElementById("result").innerText = "";
}

function check(){
    let result = document.getElementById("result");

    if(input === secret){
        result.innerHTML = "🎉 ACCESO CONCEDIDO";
        result.className = "success";
    } else {
        result.innerHTML = "💀 ERROR";
        result.className = "error";
        input = "";
        update();
    }
}

/* cerrar popup */
function closePopup(){
    document.getElementById("overlay").style.display = "none";
}

update();

</script>

</body>
</html>
