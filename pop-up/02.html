<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Puzzle 3 Popup - Colores</title>

    <style>
        /* FONDO */

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: Georgia, serif;

            background-image: url("tercera-habitacion.jpg");
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;

            background-color: black;
        }

        /* OVERLAY */

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 10, .8);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* MODAL */

        .modal {
            position: relative;
            width: 420px;
            max-width: 90%;
            padding: 20px;
            border-radius: 18px;
            background: linear-gradient(145deg, #3a3a3a, #1b1b1b);
            border: 2px solid #666;
            color: #d6c7a1;
            text-align: center;
        }

      
        /* BOTONES */

        .puzzle-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 260px;
            margin: 21px 50px;
        }

        .puzzle-buttons button {
            font-size: 35px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #222;
            cursor: pointer;
            transition: .2s;
        }

        .puzzle-buttons button:hover {
            transform: scale(1.08);
            background: #333;
        }

        /* 🔥 BOTÓN ESTILO ESCAPE ROOM PREMIUM */

        .dev-btn {
            margin-top: 15px;
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #333;
            color: #7cffb2;
            font-family: monospace;

            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .dev-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #111;
        }

        .codeBox {
            font-size: 24px;
            color: #7cffb2;
            margin-top: 10px;
        }

        /* SHAKE */

        .shake {
            animation: shake .4s;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            50% {
                transform: translateX(6px);
            }

            75% {
                transform: translateX(-6px);
            }

            100% {
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>

    <audio id="errorSound" src="error.mp3" preload="auto"></audio>
    <audio id="successSound" src="acierto.mp3" preload="auto"></audio>
    <audio id="fireSound" src="encendido.mp3" preload="auto"></audio>

    <div class="overlay" id="overlay" onclick="closeModal(event)">

        <div class="modal" onclick="event.stopPropagation()">

            <h2>Enciende las velas</h2>

            <div class="puzzle-buttons">

                <button class="candle" onclick="toggleCandle(this,1)">
                    <div class="flame"></div>
                    <div class="wick"></div>
                    <div class="bodyCandle"></div>
                </button>

                <button class="candle" onclick="toggleCandle(this,2)">
                    <div class="flame"></div>
                    <div class="wick"></div>
                    <div class="bodyCandle"></div>
                </button>

                <button class="candle" onclick="toggleCandle(this,3)">
                    <div class="flame"></div>
                    <div class="wick"></div>
                    <div class="bodyCandle"></div>
                </button>

                <button class="candle" onclick="toggleCandle(this,4)">
                    <div class="flame"></div>
                    <div class="wick"></div>
                    <div class="bodyCandle"></div>
                </button>

            </div>

            <p id="r2"></p>

            <button class="dev-btn" onclick="check()">⚙️ Ejecutar</button>

            <div id="code2" class="codeBox"></div>

        </div>

    </div>

    <script>

        let a = [];

function play(id) {

    const sonido = document.getElementById(id);

    sonido.currentTime = 0;

    sonido.play().catch(err => console.log(err));

}

function toggleCandle(el, n) {

    play("fireSound");

    el.classList.toggle("on");

    if (el.classList.contains("on")) {
        a.push(n);
    } else {
        a = a.filter(x => x !== n);
    }

    document.getElementById("r2").innerText = a.join("-");
}

function shakeModal() {

    const modal = document.querySelector(".modal");

    modal.classList.add("shake");

    modal.addEventListener("animationend", function () {

        modal.classList.remove("shake");

    }, { once: true });

}

function resetCandles() {

    a = [];

    document.getElementById("r2").innerText = "";

    document.querySelectorAll(".candle").forEach(c => {

        c.classList.remove("on");

    });

}

function check() {

    if (JSON.stringify(a) === JSON.stringify([1,2,3,4])) {

        play("successSound");

        document.getElementById("code2").innerHTML =
            "✅ Código: <span style='color:#7CFFB2;'>3</span>";

        return;
    }

    play("errorSound");

    shakeModal();

    resetCandles();

}

function closeModal(e) {

    if (e.target.id === "overlay") {

        document.getElementById("overlay").style.display = "none";

    }

}

    </script>

</body>

</html>
