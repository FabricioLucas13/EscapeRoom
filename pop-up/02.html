<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Puzzle 3 Popup - Colores</title>

<style>
   body{
    background-image:url("tercera-habitacion.jpg");
    margin:650px;
    background-size: 75%;
    background-position: center;
    background-repeat: no-repeat;
    background-color: black;
}

/* fondo oscuro */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(10,10,10,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* modal piedra */
.modal{
    position:relative;
    width:90%;
    max-width:380px;
    padding:22px;
    border-radius:18px;

    background: linear-gradient(145deg, #3a3a3a, #1b1b1b);
    border: 2px solid #6b6b6b;

    color:#d6c7a1;
    text-align:center;

    box-shadow:
        inset 0 0 18px rgba(0,0,0,0.8),
        0 0 25px rgba(0,0,0,0.9);
}

/* cerrar */
.close{
    position:absolute;
    top:10px;
    right:12px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;

    color:#c9b98a;
    text-shadow: 0 0 5px black;
}

.close:hover{
    color:#ff5a5a;
}

/* puzzle */
.puzzle-buttons{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:10px;
    max-width:260px;
    margin:15px auto;
    padding:15px;
}

/* botones */
button{
    min-width:60px;
    min-height:60px;
    font-size:22px;
    border-radius:12px;

    background: linear-gradient(145deg, #4a4a4a, #2b2b2b);
    color:#e8d9b5;

    border:2px solid #7a6a4f;

    cursor:pointer;

    box-shadow:
        inset 0 0 6px rgba(0,0,0,0.8),
        0 4px 10px rgba(0,0,0,0.6);
}

button:hover{
    transform:scale(1.08);
    background: linear-gradient(145deg, #5a5a5a, #333);
}

/* código */
.codeBox{
    font-size:22px;
    margin-top:10px;
    color:#7CFFB2;
    text-shadow: 0 0 8px rgba(0,255,150,0.3);
}

/* shake */
.shake{
    animation:shake 0.4s;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    50%{transform:translateX(6px);}
    75%{transform:translateX(-6px);}
    100%{transform:translateX(0);}
}
</style>
</head>

<body>

<!-- POPUP -->
<div class="overlay" id="overlay">

<div class="modal" id="p3">

<div class="close" onclick="closeModal()">✕</div>



<div class="puzzle-buttons">
<button onclick="add('rojo')">🔴</button>
<button onclick="add('amarillo')">🟡</button>
<button onclick="add('azul')">🔵</button>
</div>

<p id="r3"></p>
<button onclick="check()">⚙️ console.log</button>

<div id="code3" class="codeBox"></div>

</div>
</div>

<script>

let a = [];

function add(c){
    a.push(c);
    document.getElementById("r3").innerText = a.join("-");
}

function check(){
    if(JSON.stringify(a) === JSON.stringify(["rojo","amarillo","azul"])){
        document.getElementById("code3").innerText = "9";
        a = [];
    } else {
        a = [];
        document.getElementById("r3").innerText = "";
        document.getElementById("p3").classList.add("shake");

        setTimeout(()=>{
            document.getElementById("p3").classList.remove("shake");
        },400);
    }
}

/* cerrar popup */
function closeModal(){
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
