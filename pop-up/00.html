<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escape Room - Popup</title>

<style>
body{
    margin:670px;
    font-family:'Georgia', serif;
    background-image:url(primera-habitacion.jpg);
    background-size:75%;
    background-position:center;
    background-repeat:no-repeat;
    background-color:black;
}

/* OVERLAY */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(10,10,10,0.8);
    display:flex;
    align-items:center;
    justify-content:center;
}

/* MODAL */
.modal{
    position:relative;
    width:90%;
    max-width:450px;
    padding:22px;
    border-radius:18px;
    background:linear-gradient(145deg,#3a3a3a,#1b1b1b);
    border:2px solid #6b6b6b;
    color:#d6c7a1;
    text-align:center;
    box-shadow:
        inset 0 0 20px rgba(0,0,0,.7),
        0 0 25px rgba(0,0,0,.9);
}

/* BOTONES */
.puzzle-buttons{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:15px;
}

.puzzle-btn{
    width:70px;
    height:70px;
    font-size:35px;
    border:none;
    border-radius:10px;
    background:#222;
    cursor:pointer;
    transition:.2s;
    display:flex;
    justify-content:center;
    align-items:center;
}

.puzzle-btn:hover{
    transform:scale(1.08);
    background:#333;
}

/* BOTÓN EJECUTAR */
.dev-btn{
    margin-top:10px;
    padding:10px 15px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#333;
    color:#7cffb2;
    font-family:monospace;
    transition:.2s;
}

.dev-btn:hover{
    background:#444;
}

/* Código */
.codeBox{
    font-size:24px;
    margin-top:15px;
    color:#7CFFB2;
    font-weight:bold;
}

/* Error */
.shake{
    animation:shake .4s;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    50%{transform:translateX(6px);}
    75%{transform:translateX(-6px);}
    100%{transform:translateX(0);}
}
</style>
</head>

<body>

<!-- Audios -->
<audio id="errorSound" src="error.mp3" preload="auto"></audio>
<audio id="successSound" src="acierto.mp3" preload="auto"></audio>

<div class="overlay" id="overlay" onclick="closeModal(event)">

    <div class="modal" id="p1">

        <div class="puzzle-buttons">
            <button class="puzzle-btn" onclick="add1(1)">☀️</button>
            <button class="puzzle-btn" onclick="add1(2)">🔺</button>
            <button class="puzzle-btn" onclick="add1(3)">✦</button>
            <button class="puzzle-btn" onclick="add1(4)">🌙</button>
        </div>

        <p id="r1"></p>

        <button class="dev-btn" onclick="check1()">⚙️ Ejecutar</button>

        <div id="code1" class="codeBox"></div>

    </div>

</div>

<script>

let a1=[];

function play(id){
    const sonido = document.getElementById(id);

    sonido.currentTime = 0;

    sonido.play().catch(err => {
        console.log(err);
        alert("No se pudo reproducir: " + id);
    });
}

function add1(n){

    a1.push(n);

    document.getElementById("r1").innerText=a1.join("-");

}

function check1(){

    if(JSON.stringify(a1)===JSON.stringify([4,1,2,3])){

        play("successSound");

        document.getElementById("code1").innerHTML="✅ Código: <span style='color:#7CFFB2;'>7</span>";

    }else{

        play("errorSound");

        a1=[];

        document.getElementById("r1").innerText="";

        document.getElementById("p1").classList.add("shake");

        setTimeout(function(){

            document.getElementById("p1").classList.remove("shake");

        },400);

    }

}




// Cerrar pulsando el fondo negro
function closeModal(e){

    if(e.target.id==="overlay"){

        document.getElementById("overlay").style.display="none";

    }

}

</script>

</body>
</html>
