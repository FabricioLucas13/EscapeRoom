<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escape Room - Popup</title>

<style>
body{
    margin: 670px;
    font-family: 'Georgia', serif;

    background-image: url(primera-habitacion.jpg);

    /* 👇 menos zoom (más pequeña la imagen) */
    background-size: 75%;

    /* 👇 centrada */
    background-position: center;

    background-repeat: no-repeat;

    /* 👇 fondo oscuro para que no quede feo vacío */
    background-color: black;
}

/* Fondo oscuro detrás del popup */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(10,10,10,0.8);
    display:flex;
    align-items:center;
    justify-content:center;
}

/* MODAL estilo piedra */
.modal{
    position:relative;
    width:90%;
    max-width:450px;
    padding:22px;
    border-radius:18px;

    background: linear-gradient(145deg, #3a3a3a, #1b1b1b);
    border: 2px solid #6b6b6b;

    color:#d6c7a1;
    text-align:center;

    box-shadow:
        inset 0 0 20px rgba(0,0,0,0.7),
        0 0 25px rgba(0,0,0,0.9);
}

/* BOTÓN CERRAR */
.close{
    position:absolute;
    top:10px;
    right:12px;
    font-size:22px;
    color:#c9b98a;
    cursor:pointer;
    font-weight:bold;
    text-shadow: 0 0 5px black;
}

.close:hover{
    color:#ff5a5a;
}

/* BOTONES */
button{
    min-width:60px;
    min-height:60px;
    font-size:22px;
    border-radius:12px;

    background: linear-gradient(145deg, #4a4a4a, #2b2b2b);
    color:#e8d9b5;

    border:2px solid #7a6a4f;

    cursor:pointer;

    box-shadow:
        inset 0 0 6px rgba(0,0,0,0.8),
        0 4px 10px rgba(0,0,0,0.6);
}

button:hover{
    transform:scale(1.08);
}

/* código */
.codeBox{
    font-size:22px;
    margin-top:10px;
    color:#7CFFB2;
}

/* shake */
.shake{
    animation:shake 0.4s;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    50%{transform:translateX(6px);}
    75%{transform:translateX(-6px);}
    100%{transform:translateX(0);}
}
</style>
</head>

<body>

<!-- OVERLAY POPUP -->
<div class="overlay" id="overlay">

<div class="modal" id="p1">

<!-- BOTÓN CERRAR -->
<div class="close" onclick="closeModal()">✕</div>



<div class="puzzle-buttons">
<button onclick="add1(1)">☀️</button>
<button onclick="add1(2)">🔺</button>
<button onclick="add1(3)">✦</button>
<button onclick="add1(4)">🌙</button>
</div>

<p id="r1"></p>
<button onclick="check1()">Comprobar</button>
<div id="code1" class="codeBox"></div>

</div>
</div>

<script>
let a1 = [];

function add1(n){
    a1.push(n);
    document.getElementById("r1").innerText = a1.join("-");
}

function check1(){
    if(JSON.stringify(a1) === JSON.stringify([1,2,3,4])){
        document.getElementById("code1").innerText = "7";
    } else {
        a1 = [];
        document.getElementById("r1").innerText = "";
        document.getElementById("p1").classList.add("shake");
        setTimeout(()=>{
            document.getElementById("p1").classList.remove("shake");
        },400);
    }
}

/* CERRAR POPUP */
function closeModal(){
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
