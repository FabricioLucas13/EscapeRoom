<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pergamino Escape Room</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Georgia,serif;
}

/*=========================
PERGAMINO PEQUEÑO
=========================*/

.scroll-small{

    position:absolute;

    width:120px;
    height:45px;

    cursor:pointer;

    display:flex;
    justify-content:center;
    align-items:center;

    transition:.3s;
}

.scroll-small:hover{

    transform:scale(1.08);

}

.wood{

    width:12px;
    height:45px;

    background:linear-gradient(
        to right,
        #4b2f18,
        #7c5130,
        #4b2f18
    );

    border-radius:20px;

    box-shadow:0 0 8px rgba(0,0,0,.5);

}

.paper-roll{

    width:90px;
    height:35px;

    background:#d8b37a;

    background-image:

    radial-gradient(circle at 20% 30%,rgba(255,255,255,.2),transparent 40%),

    radial-gradient(circle at 80% 70%,rgba(0,0,0,.12),transparent 50%),

    repeating-linear-gradient(

        45deg,

        rgba(255,255,255,.03) 0px,

        rgba(255,255,255,.03) 2px,

        transparent 2px,

        transparent 6px

    );

    border-radius:20px;

    box-shadow:

    inset 0 0 20px rgba(80,40,0,.3),

    0 4px 10px rgba(0,0,0,.4);

    position:relative;

}

.ribbon{

    position:absolute;

    width:14px;
    height:40px;

    background:#8b0000;

    left:50%;

    transform:translateX(-50%);

    border-radius:4px;

    box-shadow:0 0 6px rgba(0,0,0,.4);

}

/*=========================
POPUP
=========================*/

.popup{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.75);

    display:flex;

    justify-content:center;

    align-items:center;

    opacity:0;

    pointer-events:none;

    transition:.4s;

}

.popup.active{

    opacity:1;

    pointer-events:auto;

}
/*=========================
PERGAMINO GRANDE
=========================*/

.scroll{

    position:relative;

    width:650px;

    transform:scale(.5);

    opacity:0;

    transition:.5s;

}

.popup.active .scroll{

    transform:scale(1);

    opacity:1;

}

.paper{

    position:relative;

    min-height:420px;

    padding:70px;

    background:#dcc08d;

    background-image:

    radial-gradient(circle at 20% 20%,rgba(255,255,255,.18),transparent 35%),

    radial-gradient(circle at 80% 70%,rgba(0,0,0,.12),transparent 50%),

    radial-gradient(circle at 30% 80%,rgba(255,255,255,.08),transparent 35%),

    repeating-linear-gradient(

        45deg,

        rgba(255,255,255,.03) 0px,

        rgba(255,255,255,.03) 2px,

        transparent 2px,

        transparent 6px

    );

    border-radius:8px;

    border:3px solid #a47742;

    box-shadow:

    inset 0 0 60px rgba(90,50,10,.25),

    0 25px 60px rgba(0,0,0,.5);

}

.paper::before{

    content:"";

    position:absolute;

    inset:15px;

    border:1px solid rgba(120,70,20,.25);

    pointer-events:none;

}

.paper h1{

    text-align:center;

    margin-bottom:40px;

    color:#4a2d12;

    font-size:42px;

}

.paper p{

    font-size:22px;

    line-height:2;

    color:#3f2715;

    margin-bottom:18px;

}

.rod-top,

.rod-bottom{

    position:absolute;

    left:-18px;

    width:686px;

    height:22px;

    background:

    linear-gradient(

        to right,

        #4b2f18,

        #8d5c35,

        #4b2f18

    );

    border-radius:20px;

    box-shadow:0 0 12px rgba(0,0,0,.5);

}

.rod-top{

    top:-12px;

}

.rod-bottom{

    bottom:-12px;

}

.close{

    position:absolute;

    top:-60px;

    right:-10px;

    width:45px;

    height:45px;

    border:none;

    border-radius:50%;

    background:#7d1b1b;

    color:white;

    cursor:pointer;

    font-size:22px;

    transition:.3s;

}

.close:hover{

    background:#a51f1f;

    transform:rotate(90deg);

}
</style>

</head>

<body>

<!-- PERGAMINO PEQUEÑO -->

<div class="scroll-small" id="openScroll">

    <div class="wood"></div>

    <div class="paper-roll">

        <div class="ribbon"></div>

    </div>

    <div class="wood"></div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

    <div class="scroll">

        <button class="close" id="closeScroll">
            ✕
        </button>

        <div class="rod-top"></div>

        <div class="paper">

            <h1>Pergamino</h1>

            <p>
                En el día más claro...
            </p>

            <p>
                Cuando las sombras cubran el camino,
                solo la luz correcta abrirá la puerta.
            </p>

            <p>
                Observa cada rincón.
            </p>

            <p>
                Nada está colocado al azar.
            </p>

            <p>
                La respuesta siempre estuvo delante de ti.
            </p>

        </div>

        <div class="rod-bottom"></div>

    </div>

</div>

<script>

const popup = document.getElementById("popup");

const openScroll = document.getElementById("openScroll");

const closeScroll = document.getElementById("closeScroll");

openScroll.addEventListener("click",()=>{

    popup.classList.add("active");

});

closeScroll.addEventListener("click",()=>{

    popup.classList.remove("active");

});

popup.addEventListener("click",(event)=>{

    if(event.target===popup){

        popup.classList.remove("active");

    }

});

document.addEventListener("keydown",(event)=>{

    if(event.key==="Escape"){

        popup.classList.remove("active");

    }

});

</script>

</body>

</html>
