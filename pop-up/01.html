<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Escape Room - Puzzle 3</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: Georgia, serif;
            background-image: url("segunda-habitacion.jpg");
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;
            background-color: black;
        }

        /* OVERLAY */

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .8);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* MODAL */

        .modal {
            position: relative;
            width: 420px;
            max-width: 90%;
            padding: 20px;
            border-radius: 18px;
            background: linear-gradient(145deg, #3a3a3a, #1b1b1b);
            border: 2px solid #666;
            color: #d6c7a1;
            text-align: center;
        }


        /* GRID */

        .puzzle-buttons {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        /* BOTÓN */

        .candle {
            position: relative;
            width: 70px;
            height: 90px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: #222;
            transition: .2s;
        }

        .candle:hover {
            transform: scale(1.05);
        }

        /* CUERPO DE LA VELA */

        .bodyCandle {
            position: absolute;
            width: 22px;
            height: 40px;
            background: #efe8c8;
            left: 50%;
            bottom: 15px;
            transform: translateX(-50%);
            border-radius: 3px;
        }

        /* MECHA */

        .wick {
            position: absolute;
            width: 2px;
            height: 8px;
            background: black;
            left: 50%;
            top: 24px;
            transform: translateX(-50%);
        }

        /* LLAMA */
        /* LLAMA */
        /* ---------- LLAMA BASE ---------- */

        .flame {
            position: absolute;
            left: 50%;
            top: 8px;
            width: 18px;
            height: 30px;
            transform: translateX(-50%);
            opacity: 0;
            pointer-events: none;

            border-radius: 60% 60% 70% 70% / 70% 70% 40% 40%;
            clip-path: polygon(50% 0%,
                    70% 18%,
                    88% 42%,
                    82% 72%,
                    60% 100%,
                    40% 100%,
                    18% 72%,
                    12% 42%,
                    30% 18%);

            filter: blur(.3px);
            animation: flameFlicker .12s infinite alternate;
        }

        .flame::before {
            content: "";
            position: absolute;
            left: 50%;
            top: -3px;
            width: 8px;
            height: 12px;
            transform: translateX(-50%);
            border-radius: 50%;
            opacity: .95;
        }

        .candle.on .flame {
            opacity: 1;
        }

        /* ---------- VELA 1 (AMARILLA) ---------- */

        .puzzle-buttons .candle:nth-child(1) .flame {
            background: radial-gradient(circle at 50% 70%,
                    #fff9c4 0%,
                    #ffe082 20%,
                    #ffca28 40%,
                    #ff9800 65%,
                    #ff5722 90%,
                    transparent 100%);

            box-shadow:
                0 0 6px #fff176,
                0 0 14px #ffb300,
                0 0 24px #ff6f00;
        }

        .puzzle-buttons .candle:nth-child(1) .flame::before {
            background: radial-gradient(circle,
                    #fff 0%,
                    #fff59d 70%,
                    transparent 100%);
        }

        /* ---------- VELA 2 (AZUL) ---------- */

        .puzzle-buttons .candle:nth-child(2) .flame {
            background: radial-gradient(circle at 50% 70%,
                    #e3f2fd 0%,
                    #81d4fa 20%,
                    #29b6f6 40%,
                    #039be5 65%,
                    #01579b 90%,
                    transparent 100%);

            box-shadow:
                0 0 6px #81d4fa,
                0 0 14px #29b6f6,
                0 0 24px #0288d1;
        }

        .puzzle-buttons .candle:nth-child(2) .flame::before {
            background: radial-gradient(circle,
                    #fff 0%,
                    #b3e5fc 70%,
                    transparent 100%);
        }

        /* ---------- VELA 3 (VERDE) ---------- */

        .puzzle-buttons .candle:nth-child(3) .flame {
            background: radial-gradient(circle at 50% 70%,
                    #f1f8e9 0%,
                    #aed581 20%,
                    #66bb6a 40%,
                    #43a047 65%,
                    #1b5e20 90%,
                    transparent 100%);

            box-shadow:
                0 0 6px #aed581,
                0 0 14px #66bb6a,
                0 0 24px #2e7d32;
        }

        .puzzle-buttons .candle:nth-child(3) .flame::before {
            background: radial-gradient(circle,
                    #fff 0%,
                    #c5e1a5 70%,
                    transparent 100%);
        }

        /* ---------- VELA 4 (MORADA) ---------- */

        .puzzle-buttons .candle:nth-child(4) .flame {
            background: radial-gradient(circle at 50% 70%,
                    #f3e5f5 0%,
                    #ce93d8 20%,
                    #ab47bc 40%,
                    #8e24aa 65%,
                    #4a148c 90%,
                    transparent 100%);

            box-shadow:
                0 0 6px #ce93d8,
                0 0 14px #ab47bc,
                0 0 24px #6a1b9a;
        }

        .puzzle-buttons .candle:nth-child(4) .flame::before {
            background: radial-gradient(circle,
                    #fff 0%,
                    #e1bee7 70%,
                    transparent 100%);
        }

        @keyframes flameFlicker {
            0% {
                transform: translateX(-50%) rotate(-2deg) scale(1);
            }

            50% {
                transform: translateX(-50%) rotate(2deg) scale(1.05, .95);
            }

            100% {
                transform: translateX(-50%) rotate(-1deg) scale(.97, 1.03);
            }
        }

        .dev-btn {
            margin-top: 15px;
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #333;
            color: #7cffb2;
            font-family: monospace;

            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }



        .dev-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #111;
        }

        .codeBox {
            font-size: 24px;
            color: #7cffb2;
            margin-top: 10px;
        }

        /* EFECTO DE VIBRACIÓN */

        .shake {
            animation: shake .4s;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            50% {
                transform: translateX(6px);
            }

            75% {
                transform: translateX(-6px);
            }

            100% {
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>

  <body>

    <audio id="errorSound" src="error.mp3" preload="auto"></audio>
    <audio id="successSound" src="acierto.mp3" preload="auto"></audio>

    <div class="overlay" id="overlay" onclick="closeModal(event)">

        <div class="modal" onclick="event.stopPropagation()">

            <h2>Enciende las velas</h2>

            <div class="puzzle-buttons">

                <button class="candle" onclick="toggleCandle(this,1)">
                    <div class="flame"></div>
                    <div class="wick"></div>
                    <div class="bodyCandle"></div>
                </button>

                <button class="candle" onclick="toggleCandle(this,2)">
                    <div class="flame"></div>
                    <div class="wick"></div>
                    <div class="bodyCandle"></div>
                </button>

                <button class="candle" onclick="toggleCandle(this,3)">
                    <div class="flame"></div>
                    <div class="wick"></div>
                    <div class="bodyCandle"></div>
                </button>

                <button class="candle" onclick="toggleCandle(this,4)">
                    <div class="flame"></div>
                    <div class="wick"></div>
                    <div class="bodyCandle"></div>
                </button>

            </div>

            <p id="r2"></p>

            <button class="dev-btn" onclick="check()">⚙️ Ejecutar</button>

            <div id="code2" class="codeBox"></div>

        </div>

    </div>



    <script>
let a = [];

function play(id) {
    const sonido = document.getElementById(id);

    sonido.currentTime = 0;
    sonido.play().catch(err => console.log(err));
}

function toggleCandle(el, n) {

    el.classList.toggle("on");

    if (el.classList.contains("on")) {
        a.push(n);
    } else {
        a = a.filter(x => x !== n);
    }

    document.getElementById("r2").innerText = a.join("-");
}

function shakeModal() {

    const modal = document.querySelector(".modal");

    modal.classList.add("shake");

    modal.addEventListener("animationend", function () {
        modal.classList.remove("shake");
    }, { once: true });
}

function resetCandles() {

    a = [];

    document.getElementById("r2").innerText = "";

    document.querySelectorAll(".candle").forEach(c => {
        c.classList.remove("on");
    });
}

function check() {

    // Combinación correcta
    if (JSON.stringify(a) === JSON.stringify([1, 2, 3, 4])) {

        play("successSound");

        document.getElementById("code2").innerHTML =
            "✅ Código: <span style='color:#7CFFB2;'>3</span>";

        return;
    }

    play("errorSound");

    shakeModal();

    resetCandles();
}

function closeModal(e) {

    if (e.target.id === "overlay") {
        document.getElementById("overlay").style.display = "none";
    }
}

    </script>

</body>

</html>
